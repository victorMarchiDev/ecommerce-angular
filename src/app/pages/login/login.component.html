<section class="container py-4">
  <h1 class="mb-3">Dados do Usuário</h1>

  <form [formGroup]="form" class="card p-3 mb-4">

    <div class="mb-3">
      <label class="form-label">Nome</label>
      <input type="text" class="form-control" formControlName="nome">
    </div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" formControlName="email">
    </div>

    <div class="mb-3">
      <label class="form-label">Senha</label>
      <input type="password" class="form-control" formControlName="senha">
    </div>

    <div class="d-flex gap-2">
      <button type="button" class="btn btn-primary" (click)="salvarAlteracoes()">
        Salvar Alterações
      </button>

      <button type="button" class="btn btn-danger" (click)="deletarUsuario()">
        Deletar Usuário
      </button>
    </div>

  </form>
</section>
